name: signaleye

services:
  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME:-signaleye}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in deploy/docker/.env}"
    ports:
      - "${RABBITMQ_MANAGEMENT_BIND_ADDRESS:-127.0.0.1}:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt-protocol-service:
    build:
      context: ../..
      dockerfile: deploy/docker/mqtt-protocol-service.Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${MQTT_BIND_ADDRESS:-127.0.0.1}:${MQTT_PORT:-1883}:1883"
    environment:
      Mqtt__Port: "${MQTT_PORT:-1883}"
      Mqtt__Username: "${MQTT_USERNAME:-}"
      Mqtt__Password: "${MQTT_PASSWORD:-}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: "${RABBITMQ_USERNAME:-signaleye}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
    volumes:
      - telemetry-logs:/var/lib/signaleye/logs

  device-gateway-service:
    build:
      context: ../..
      dockerfile: deploy/docker/device-gateway-service.Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: "${RABBITMQ_USERNAME:-signaleye}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
    volumes:
      - telemetry-logs:/var/lib/signaleye/logs

volumes:
  rabbitmq-data:
  telemetry-logs:
